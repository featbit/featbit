<div class="theme-switcher" role="group" aria-label="Theme preference" i18n-aria-label="@@theme.switcher.group">
  <button type="button"
        class="theme-option"
        [class.active]="preference === 'light'"
        [attr.aria-pressed]="preference === 'light'"
        (click)="setPreference('light')"
        aria-label="Light theme"
        i18n-aria-label="@@theme.switcher.light.aria"
        title="Light"
        i18n-title="@@theme.switcher.light.title">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
    </svg>
  </button>
  <button type="button"
        class="theme-option"
        [class.active]="preference === 'dark'"
        [attr.aria-pressed]="preference === 'dark'"
        (click)="setPreference('dark')"
        aria-label="Dark theme"
        i18n-aria-label="@@theme.switcher.dark.aria"
        title="Dark"
        i18n-title="@@theme.switcher.dark.title">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
  <button type="button"
        class="theme-option"
        [class.active]="preference === 'system'"
        [attr.aria-pressed]="preference === 'system'"
        (click)="setPreference('system')"
        aria-label="Follow system theme"
        i18n-aria-label="@@theme.switcher.system.aria"
        title="System"
        i18n-title="@@theme.switcher.system.title">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
      <path d="M8 21h8M12 17v4"></path>
    </svg>
  </button>
</div>
