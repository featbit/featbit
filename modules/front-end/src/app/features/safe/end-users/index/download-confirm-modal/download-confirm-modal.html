<nz-modal
  nzAutofocus="cancel"
  nzClassName="download-confirm-modal"
  [nzVisible]="visible"
  (nzOnCancel)="onClose()"
  [nzCentered]="true"
  i18n-nzTitle="@@users.idx.download-end-users"
  nzTitle="Download End-Users">
  <ng-container *nzModalContent>
    <p class="download-tip" i18n="@@users.idx.download-confirm">You are about to download <strong>the end-users matching your current filters</strong> in the current environment. Are you sure you want to continue?</p>
    @if (totalCount > 50000) {
      <nz-alert
        nzType="error"
        nzShowIcon
        nzMessage="The current filter matches more than 50,000 results"
        i18n-nzMessage="@@users.idx.download-limit-exceeded-title"
        nzDescription="Download is not supported when the result exceeds this limit. Narrow your filters and try again."
        i18n-nzDescription="@@users.idx.download-limit-exceeded-desc">
      </nz-alert>
    }
  </ng-container>
  <ng-container *nzModalFooter>
    <div class="footer">
      <span class="footnote">
        <span i18n="@@common.total">Total</span>: {{ totalCount }}
      </span>
      <div class="actions">
        <button nz-button nzType="default" (click)="onClose()" i18n="@@common.cancel">Cancel</button>
        <button
          nz-button
          nzType="primary"
          [nzLoading]="isDownloading"
          [disabled]="totalCount > 50000"
          (click)="confirmDownload()"
          i18n="@@common.continue">Continue</button>
      </div>
    </div>
  </ng-container>
</nz-modal>
