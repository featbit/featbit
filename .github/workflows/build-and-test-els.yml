name: Build and Test Evaluation-Server
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'modules/evaluation-server/**'
      - '.github/build-and-test-els.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'modules/evaluation-server/**'
      - '.github/build-and-test-els.yml'

jobs:
  validate:
    name: build-and-test-els
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/evaluation-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Packages
        run: dotnet restore

      - name: Build Solution
        run: dotnet build -c Release --no-restore

      - name: Run Tests
        # Category=Integration tests require Docker (Testcontainers) and are local-only.
        run: dotnet test -c Release --no-build --verbosity normal --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-evaluation-server
          path: modules/evaluation-server/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
